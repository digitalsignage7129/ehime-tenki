<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム時系列天気予報</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="weather-timeline-container">
        
        <div class="timeline-header">
            <div class="date-display" id="date-display">--/--</div>
            <div class="view-title" id="view-title">天気予報</div>
            
            <div class="time-scale" id="time-scale"></div>
        </div>

        <div class="timeline-rows" id="timeline-rows">
            <div style="color: white; text-align: center; padding: 20px; font-weight: bold;">気象庁から最新のデータを解析中...</div>
        </div>
    </div>

    <script>
        const areaMapping = {
            ehime: {
                title: "愛媛県",
                centerCode: "380000",
                cities: [
                    { name: "新居浜", weatherAreaCode: "380020", tempAreaCode: "38131", fallbackOffset: -1 },
                    { name: "今治",   weatherAreaCode: "380020", tempAreaCode: "38116", fallbackOffset: -1 }, 
                    { name: "松山",   weatherAreaCode: "380010", tempAreaCode: "38211", fallbackOffset: 0 },  
                    { name: "西条",   weatherAreaCode: "380020", tempAreaCode: "38136", fallbackOffset: -1 }, 
                    { name: "大洲",   weatherAreaCode: "380030", tempAreaCode: "38316", fallbackOffset: 1 },  
                    { name: "宇和",   weatherAreaCode: "380030", tempAreaCode: "38326", fallbackOffset: -2 }, 
                    { name: "宇和島", weatherAreaCode: "380030", tempAreaCode: "38356", fallbackOffset: 2 }   
                ]
            },
            japan: {
                title: "全国の天気",
                centerCode: "130000",
                cities: [
                    { name: "札幌",   center: "016000", weatherAreaCode: "016010", tempAreaCode: "016010", fallbackOffset: -6 },
                    { name: "仙台",   center: "040000", weatherAreaCode: "040010", tempAreaCode: "040010", fallbackOffset: -2 },
                    { name: "東京",   center: "130000", weatherAreaCode: "130010", tempAreaCode: "130010", fallbackOffset: 2 },
                    { name: "名古屋", center: "230000", weatherAreaCode: "230010", tempAreaCode: "230010", fallbackOffset: 1 },
                    { name: "大阪",   center: "270000", weatherAreaCode: "270000", tempAreaCode: "270000", fallbackOffset: 3 },
                    { name: "広島",   center: "340000", weatherAreaCode: "340010", tempAreaCode: "340010", fallbackOffset: 0 },
                    { name: "福岡",   center: "400000", weatherAreaCode: "400010", tempAreaCode: "400010", fallbackOffset: 1 }
                ]
            }
        };

        function getWeatherIcon(jmaCode) {
            const code = parseInt(jmaCode);
            if ([100, 101, 102, 123, 124, 130, 131].includes(code)) return "☀️";
            if ([200, 201, 202, 213, 214, 224, 230].includes(code)) return "☁️";
            if ([300, 301, 302, 303, 311, 313, 340, 350].includes(code)) return "☔";
            if ([400, 401, 402, 403, 411, 413, 450].includes(code)) return "☃️";
            return "🌤️"; 
        }

        function getModeFromURL() {
            const hash = window.location.hash.replace('#', '').replace(/\/$/, '').trim();
            return areaMapping[hash] ? hash : 'ehime';
        }

        async function fetchAndRenderTimeline() {
            const mode = getModeFromURL();
            const config = areaMapping[mode];

            document.getElementById('view-title').innerText = config.title;
            const container = document.getElementById('timeline-rows');

            try {
                let rowsHTML = '';
                const now = new Date();

                // 日付表示の更新
                const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
                document.getElementById('date-display').innerText = `${now.getMonth() + 1}/${now.getDate()}(${dayNames[now.getDay()]})`;

                // 1. 最初に対象管区の「時系列データ（3時間ごと）」を取得
                const timeSeriesResponse = await fetch(`https://www.jma.go.jp/bosai/forecast/data/forecast/${config.centerCode}.json`);
                const timeSeriesData = await timeSeriesResponse.json();

                // 気象庁の時系列データ（通常、インデックス1に入っている）を取得
                const jmaHourlySeries = timeSeriesData[1];
                const timeDefines = jmaHourlySeries.timeDefines; // データの時間軸配列

                // 現在時刻以降のデータが始まるインデックスを探す（最大8コマ分抽出）
                let startIdx = timeDefines.findIndex(timeStr => new Date(timeStr) >= now) - 1;
                if (startIdx < 0) startIdx = 0;

                // 画面上の時間目盛り（タイムスケール）を現在の時間起点で動的に生成
                const scaleContainer = document.getElementById('time-scale');
                let scaleHTML = '';
                for(let i = 0; i < 8; i++) {
                    const d = new Date(timeDefines[startIdx + i] || now);
                    scaleHTML += `<div>${d.getHours()}</div>`;
                }
                scaleContainer.innerHTML = scaleHTML;

                // 2. 各都市ごとの個別データを処理
                for (const city of config.cities) {
                    const targetCenter = city.center || config.centerCode;
                    
                    // 各都市の詳細予報JSONを読み込み
                    let cityData = timeSeriesData;
                    if (city.center) {
                        const res = await fetch(`https://www.jma.go.jp/bosai/forecast/data/forecast/${city.center}.json`);
                        cityData = await res.json();
                    }

                    // --- 天気アイコンデータの抽出（現在時刻ベースの8コマ） ---
                    const hourlyWeatherArea = cityData[1].timeSeries[0].areas.find(a => a.area.code === city.weatherAreaCode);
                    let weatherCodes = hourlyWeatherArea ? hourlyWeatherArea.weatherCodes : [];
                    
                    // 抜き出した時間軸に合わせて天気を8コマ分カット
                    let displayIcons = [];
                    for(let i = 0; i < 8; i++) {
                        const code = weatherCodes[startIdx + i] || "100";
                        displayIcons.push(getWeatherIcon(code));
                    }

                    // --- 【新ロジック】各都市の公式最高・最低気温の取得 ---
                    let low = 20;
                    let high = 28;
                    const dailyTempSeries = cityData[0].timeSeries.find(s => s.temps);
                    
                    if (dailyTempSeries && dailyTempSeries.areas) {
                        // 各都市のエリアコードに完全に一致する公式気温データをピンポイントで抽出
                        const exactTempArea = dailyTempSeries.areas.find(a => a.area.code === city.tempAreaCode || a.area.code === city.weatherAreaCode);
                        if (exactTempArea && exactTempArea.temps && exactTempArea.temps.length >= 2) {
                            low = parseInt(exactTempArea.temps[0]);
                            high = parseInt(exactTempArea.temps[1]);
                        } else {
                            // 万が一データが抜けている時間帯は、ベース気温から安全にオフセット計算
                            if (exactTempArea && exactTempArea.temps && exactTempArea.temps[0]) {
                                low = parseInt(exactTempArea.temps[0]);
                            }
                            high = low + 7;
                        }
                    }

                    // HTML構築
                    let timelineHTML = '';
                    displayIcons.forEach(icon => {
                        timelineHTML += `<div class="hourly-icon">${icon}</div>`;
                    });

                    rowsHTML += `
                        <div class="row">
                            <div class="city-name">${city.name}</div>
                            <div class="temp-zone">
                                <div class="temp-low">${low}</div>
                                <div class="temp-high">${high}</div>
                            </div>
                            <div class="weather-forecast-bar">
                                ${timelineHTML}
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = rowsHTML;

            } catch (error) {
                console.error("データ取得または解析失敗:", error);
                container.innerHTML = `<div style="color: white; text-align: center; padding: 20px;">気象庁のデータ更新時間中のため、再取得しています...</div>`;
            }
        }

        fetchAndRenderTimeline();
        setInterval(fetchAndRenderTimeline, 600000); // 10分ごとに気象庁の最新状態と同期
        window.onhashchange = fetchAndRenderTimeline;
    </script>
</body>
</html>
