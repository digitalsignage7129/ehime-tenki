<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3時間ごとの天気予報 ＆ ドライブ情報 サイネージ</title>
    <style>
        :root {
            --bg-color: #f8fafc; /* 明るく清潔感のあるオフホワイト */
            --panel-bg: #ffffff;
            --table-header-bg: #1e88e5; /* 爽やかで信頼感のあるブルー */
            --table-header-text: #ffffff;
            --cell-bg-even: #ffffff;
            --cell-bg-odd: #f1f5f9; /* 視線が横にスムーズに流れるための互い違いの薄いグレー */
            --text-main: #0f172a; /* 視認性を極限まで高めるための非常に濃い墨色 */
            --text-sub: #475569;
            --border-color: #cbd5e1;
            --temp-color: #ea580c; /* 遠くからでも一瞬で気温が識別できるディープオレンジ */
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 1vw; 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        .layout-container {
            display: flex;
            gap: 1.5vw;
            height: 100%;
            width: 100%;
        }

        /* 左側：メインの天気ボード */
        .weather-board {
            flex: 8; /* 80%の幅 */
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        /* 右側：PAドライブアラート */
        .alert-board {
            flex: 2; /* 20%の幅 */
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border-color);
            padding: 2vh 1.5vw;
            justify-content: flex-start;
            gap: 2vh;
        }

        .board-header {
            background-color: var(--panel-bg);
            padding: 1vh 2vw;
            height: 8vh; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--table-header-bg);
        }

        .board-title {
            font-size: 2vw; 
            font-weight: 900;
            color: var(--table-header-bg);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .date-badge {
            background-color: #e0f2fe;
            color: #0369a1;
            font-weight: bold;
            padding: 0.5vh 1.5vw;
            border-radius: 30px;
            font-size: 1.2vw;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: 14% 12% repeat(8, 1fr); 
            height: 90vh; 
            width: 100%;
        }

        .cell {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            padding: 0.5vh 0.2vw;
        }

        .weather-grid > *:nth-child(10n) {
            border-right: none;
        }

        .weather-grid > *:nth-last-child(-n+10) {
            border-bottom: none;
        }

        .header-cell {
            background-color: var(--table-header-bg);
            color: var(--table-header-text);
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #0d47a1;
        }

        .time-hour {
            font-size: 1.8vw;
            font-weight: bold;
        }

        .time-day {
            font-size: 1vw;
            opacity: 0.9;
            margin-bottom: 2px;
        }

        .location-cell {
            font-size: 1.8vw;
            font-weight: bold;
            background-color: #f1f5f9; /* 視線のアンカーとなるよう、ほんの少し濃いグレーに */
            color: var(--text-main);
            border-right: 2px solid var(--table-header-bg);
        }

        .summary-temp-cell {
            font-size: 0.9vw;
            font-weight: bold;
            background-color: #f8fafc;
            line-height: 1.6;
            text-align: center;
        }
        .sum-high { color: #dc2626; font-weight: 800; }
        .sum-low { color: #2563eb; font-weight: 800; }

        .data-cell {
            background-color: var(--cell-bg-even);
        }

        .row-odd {
            background-color: var(--cell-bg-odd);
        }

        .weather-icon {
            font-size: 3vw; 
            line-height: 1;
            margin-bottom: 0.5vh;
        }

        .weather-temp {
            font-size: 1.8vw; 
            font-weight: 800;
            color: var(--temp-color);
        }

        .temp-symbol {
            font-size: 1.1vw;
            font-weight: normal;
            margin-left: 1px;
        }

        /* アラートセクション用のスタイル（ホワイト） */
        .alert-section-title {
            font-size: 1.4vw;
            font-weight: bold;
            color: var(--table-header-bg);
            border-left: 5px solid var(--table-header-bg);
            padding-left: 10px;
            margin-bottom: 1vh;
        }

        .alert-card {
            background-color: #f8fafc;
            border-radius: 8px;
            padding: 2.5vh 1.2vw;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            flex-grow: 1;
        }

        /* 警告時の点滅アニメーション（ホワイト版：視線を惹きつける赤パルス） */
        @keyframes pulse-light {
            0% { border-color: #ef4444; box-shadow: 0 0 5px rgba(239, 68, 68, 0.3); }
            50% { border-color: #dc2626; box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }
            100% { border-color: #ef4444; box-shadow: 0 0 5px rgba(239, 68, 68, 0.3); }
        }

        .alert-card.danger {
            background-color: #fef2f2; /* 薄い赤 */
            border: 2px solid #ef4444;
            animation: pulse-light 2s infinite;
        }

        .alert-card.warning {
            background-color: #fffbeb; /* 薄い黄色 */
            border: 2px solid #f59e0b;
        }

        .alert-icon {
            font-size: 4vw;
            margin-bottom: 1.5vh;
        }

        .alert-title {
            font-size: 1.6vw;
            font-weight: 900;
            margin-bottom: 1.5vh;
        }

        .alert-desc {
            font-size: 1.1vw;
            line-height: 1.5;
            color: var(--text-main);
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="layout-container">
        <!-- 左側：お天気メインボード -->
        <div class="weather-board">
            <div class="board-header">
                <h1 class="board-title" id="board-title">🌦| 天気予報</h1>
                <div class="date-badge" id="date-badge">--/--</div>
            </div>

            <div class="weather-grid" id="weather-grid">
                <!-- 骨組みはJavaScriptが初期起動時に自動生成します -->
            </div>
        </div>

        <!-- 右側：ドライブアラート（PA専用枠） -->
        <div class="alert-board">
            <div class="alert-section-title">安全運転情報</div>
            <div class="alert-card" id="drive-alert-card">
                <div class="alert-icon" id="drive-alert-icon">🚗</div>
                <div class="alert-title" id="drive-alert-title">安全運転で快適に</div>
                <div class="alert-desc" id="drive-alert-desc">
                    気象データを読み込み中。安全運転をサポートする注意報を自動で計算してここに表示します。
                </div>
            </div>

            <div class="alert-section-title">リフレッシュ予報</div>
            <div class="alert-card" id="health-alert-card">
                <div class="alert-icon" id="health-alert-icon">🍵</div>
                <div class="alert-title" id="health-alert-title">リフレッシュ</div>
                <div class="alert-desc" id="health-alert-desc">
                    外気温・湿度に基づいた体調ケアのアドバイスをここに自動表示します。
                </div>
            </div>
        </div>
    </div>

    <script>
        const areaMapping = {
            ehime: {
                title: "🌦️ 愛媛県内 各エリアの天気予報",
                cities: [
                    { name: "四国中央", lat: 33.9833, lon: 133.5464 },
                    { name: "新居浜",   lat: 33.9572, lon: 133.2828 },
                    { name: "今治",     lat: 34.0662, lon: 132.9978 }, 
                    { name: "松山",     lat: 33.8416, lon: 132.7657 },  
                    { name: "大洲",     lat: 33.5065, lon: 132.5447 },  
                    { name: "西予宇和", lat: 33.3644, lon: 132.5111 }, 
                    { name: "宇和島",   lat: 33.2234, lon: 132.5605 }   
                ]
            },
            japan: {
                title: "🗺️ 全国の天気予報",
                cities: [
                    { name: "札幌",   lat: 43.0621, lon: 141.3544 },
                    { name: "仙台",   lat: 38.2682, lon: 140.8694 },
                    { name: "東京",   lat: 35.6895, lon: 139.6917 },
                    { name: "名古屋", lat: 35.1815, lon: 136.9066 },
                    { name: "大阪",   lat: 34.6937, lon: 135.5022 },
                    { name: "広島",   lat: 34.3853, lon: 132.4553 },
                    { name: "福岡",   lat: 33.5904, lon: 130.4017 }
                ]
            }
        };

        function getWeatherIcon(wmoCode) {
            if ([0].includes(wmoCode)) return "☀️"; 
            if ([1, 2].includes(wmoCode)) return "🌤️"; 
            if ([3].includes(wmoCode)) return "☁️"; 
            if ([45, 48].includes(wmoCode)) return "🌫️"; 
            if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(wmoCode)) return "☔"; 
            if ([71, 73, 75, 77, 85, 86].includes(wmoCode)) return "☃️"; 
            if ([95, 96, 99].includes(wmoCode)) return "⚡"; 
            return "🌤️"; 
        }

        function getModeFromURL() {
            const hash = window.location.hash.replace('#', '').replace(/\/$/, '').trim();
            return areaMapping[hash] ? hash : 'ehime';
        }

        function createStaticSkeleton(config) {
            const gridContainer = document.getElementById('weather-grid');
            gridContainer.innerHTML = ''; 

            const c1 = document.createElement('div');
            c1.className = 'cell header-cell';
            c1.style.backgroundColor = '#1e88e5';
            c1.innerText = '観測地点';
            gridContainer.appendChild(c1);

            const c2 = document.createElement('div');
            c2.className = 'cell header-cell';
            c2.style.backgroundColor = '#1e88e5';
            c2.innerHTML = '<div style="font-size:0.9vw; line-height:1.2;">24時間以内の<br>気温予想</div>';
            gridContainer.appendChild(c2);

            for (let i = 0; i < 8; i++) {
                const timeCell = document.createElement('div');
                timeCell.className = 'cell header-cell';
                timeCell.id = `header-time-${i}`;
                gridContainer.appendChild(timeCell);
            }

            config.cities.forEach((city, rIndex) => {
                const rowBgClass = (rIndex % 2 === 1) ? 'row-odd' : '';

                const locCell = document.createElement('div');
                locCell.className = `cell location-cell ${rowBgClass}`;
                locCell.innerText = city.name;
                gridContainer.appendChild(locCell);

                const sumCell = document.createElement('div');
                sumCell.className = `cell summary-temp-cell ${rowBgClass}`;
                sumCell.id = `sum-cell-${rIndex}`;
                gridContainer.appendChild(sumCell);

                for (let cIndex = 0; cIndex < 8; cIndex++) {
                    const dataCell = document.createElement('div');
                    dataCell.className = `cell data-cell ${rowBgClass}`;
                    dataCell.id = `data-cell-${rIndex}-${cIndex}`;
                    gridContainer.appendChild(dataCell);
                }
            });
        }

        let currentActiveMode = "";

        async function fetchAndRenderSignage() {
            const mode = getModeFromURL();
            const config = areaMapping[mode];

            if (currentActiveMode !== mode) {
                document.getElementById('board-title').innerText = config.title;
                createStaticSkeleton(config);
                currentActiveMode = mode;
            }

            try {
                const now = new Date();
                const startHour = Math.floor(now.getHours() / 3) * 3;
                const baseDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), startHour, 0, 0);

                const displayTimes = [];
                for (let i = 0; i < 8; i++) {
                    displayTimes.push(new Date(baseDate.getTime() + i * 3 * 60 * 60 * 1000));
                }

                const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
                document.getElementById('date-badge').innerText = `本日：${displayTimes[0].getMonth() + 1}/${displayTimes[0].getDate()}日 (${dayNames[displayTimes[0].getDay()]})`;

                displayTimes.forEach((t, i) => {
                    const isNextDay = t.getDate() !== now.getDate();
                    const dayLabel = isNextDay ? "明日" : "今日";
                    const el = document.getElementById(`header-time-${i}`);
                    if (el) {
                        el.innerHTML = `
                            <div class="time-day">${dayLabel}</div>
                            <div class="time-hour">${t.getHours()}:00</div>
                        `;
                    }
                });

                let maxWindSpeed = 0;
                let windyLocation = "";
                let minTempObserved = 99;
                let maxTempObserved = -99;
                let humidityAverage = 60;

                for (let rIndex = 0; rIndex < config.cities.length; rIndex++) {
                    const city = config.cities[rIndex];

                    const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&hourly=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&timezone=Asia%2FTokyo`);
                    const data = await response.json();

                    const hourlyTimes = data.hourly.time;
                    const temperatures = data.hourly.temperature_2m;
                    const windSpeeds = data.hourly.wind_speed_10m;
                    const humidities = data.hourly.relative_humidity_2m;
                    const weatherCodes = data.hourly.weather_code;

                    let matchedTemps = [];

                    displayTimes.forEach((targetTime, cIndex) => {
                        const year = targetTime.getFullYear();
                        const month = String(targetTime.getMonth() + 1).padStart(2, '0');
                        const date = String(targetTime.getDate()).padStart(2, '0');
                        const hour = String(targetTime.getHours()).padStart(2, '0');
                        const matchStr = `${year}-${month}-${date}T${hour}:00`;

                        const idx = hourlyTimes.indexOf(matchStr);
                        const cellEl = document.getElementById(`data-cell-${rIndex}-${cIndex}`);

                        if (cellEl && idx !== -1) {
                            const tempVal = Math.round(temperatures[idx]);
                            const codeVal = weatherCodes[idx];
                            const windVal = windSpeeds[idx];
                            const windSpeedMs = Math.round((windVal / 3.6) * 10) / 10;

                            matchedTemps.push(tempVal);

                            if (windSpeedMs > maxWindSpeed) {
                                maxWindSpeed = windSpeedMs;
                                windyLocation = city.name;
                            }
                            if (tempVal < minTempObserved) minTempObserved = tempVal;
                            if (tempVal > maxTempObserved) maxTempObserved = tempVal;

                            if (cIndex === 0) {
                                humidityAverage = humidities[idx];
                            }

                            cellEl.innerHTML = `
                                <div class="weather-icon">${getWeatherIcon(codeVal)}</div>
                                <div class="weather-temp">${tempVal}<span class="temp-symbol">°C</span></div>
                            `;
                        }
                    });

                    const low = matchedTemps.length > 0 ? Math.min(...matchedTemps) : "--";
                    const high = matchedTemps.length > 0 ? Math.max(...matchedTemps) : "--";

                    const sumEl = document.getElementById(`sum-cell-${rIndex}`);
                    if (sumEl) {
                        sumEl.innerHTML = `
                            <div class="sum-high">最高 ${high}°C</div>
                            <div class="sum-low">最低 ${low}°C</div>
                        `;
                    }
                }

                updateDriveAlert(maxWindSpeed, windyLocation, minTempObserved);
                updateHealthAlert(maxTempObserved, humidityAverage);

            } catch (error) {
                console.error("更新エラー:", error);
            }
        }

        function updateDriveAlert(windSpeed, location, minTemp) {
            const card = document.getElementById('drive-alert-card');
            const icon = document.getElementById('drive-alert-icon');
            const title = document.getElementById('drive-alert-title');
            const desc = document.getElementById('drive-alert-desc');

            card.className = "alert-card";

            if (windSpeed >= 7.0) {
                card.classList.add("danger");
                icon.innerText = "🍃";
                title.innerText = "【横風注意】";
                title.style.color = "#dc2626";
                desc.innerHTML = `現在、<strong>${location}周辺</strong>で風速 <strong>${windSpeed} m/s</strong> 以上の強風が予想されています。橋の上や高架、トンネルの出口などでの急なハンドルさばきにご注意ください。`;
            } 
            else if (minTemp <= 3) {
                card.classList.add("danger");
                icon.innerText = "❄️";
                title.innerText = "【凍結注意】";
                title.style.color = "#2563eb";
                desc.innerHTML = `冷え込みが予想されます（最低気温予測: <strong>${minTemp}°C</strong>）。高架道路、橋の上、日陰での急ハンドル・急ブレーキを避け、安全運転をお願いします。`;
            } 
            else {
                card.classList.add("warning");
                icon.innerText = "🚗";
                title.innerText = "【安全運転】";
                title.style.color = "#d97706";
                desc.innerHTML = "気象条件は概ね安定しています。疲れを感じる前に早めに休憩を取り、心にゆとりを持ってこの先もお進みください。";
            }
        }

        function updateHealthAlert(maxTemp, humidity) {
            const icon = document.getElementById('health-alert-icon');
            const title = document.getElementById('health-alert-title');
            const desc = document.getElementById('health-alert-desc');

            if (maxTemp >= 28) {
                icon.innerText = "🥵";
                title.innerText = "熱中症注意";
                title.style.color = "#ea580c";
                desc.innerHTML = `各所で最高気温 <strong>${maxTemp}°C</strong> 以上の厳しい暑さが予想されています。車内でもエアコンを使用し、喉が渇く前にこまめな水分・塩分補給を行ってください。`;
            } 
            else if (humidity < 50) {
                icon.innerText = "🍂";
                title.innerText = "乾燥注意";
                title.style.color = "#d97706";
                desc.innerHTML = `現在の湿度は <strong>${humidity}%</strong> と乾燥気味です。エアコンによる喉・お肌の乾燥に備え、PA売店でお好みのドリンクや潤いグッズをどうぞ。`;
            } 
            else {
                icon.innerText = "☕";
                title.innerText = "ほっと一息";
                title.style.color = "#16a34a";
                desc.innerHTML = "お疲れ様です！PAのフードコートや自販機コーナーで、温かい飲み物や美味しいグルメを楽しみながらリフレッシュしてください。";
            }
        }

        fetchAndRenderSignage();
        setInterval(fetchAndRenderSignage, 600000);
        window.onhashchange = fetchAndRenderSignage;
    </script>
</body>
</html>
