<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム時系列天気予報</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="weather-timeline-container">
        
        <div class="timeline-header">
            <div class="date-display" id="date-display">--/--</div>
            <div class="view-title" id="view-title">天気予報</div>
            
            <div class="time-scale" id="time-scale"></div>
        </div>

        <div class="timeline-rows" id="timeline-rows">
            <div style="color: white; text-align: center; padding: 20px; font-weight: bold;">気象庁から最新のデータを解析中...</div>
        </div>
    </div>

    <script>
        const areaMapping = {
            ehime: {
                title: "愛媛県",
                centerCode: "380000",
                cities: [
                    { name: "新居浜", weatherAreaCode: "380020", tempAreaCode: "38131" },
                    { name: "今治",   weatherAreaCode: "380020", tempAreaCode: "38116" }, 
                    { name: "松山",   weatherAreaCode: "380010", tempAreaCode: "38211" },  
                    { name: "西条",   weatherAreaCode: "380020", tempAreaCode: "38136" }, 
                    { name: "大洲",   weatherAreaCode: "380030", tempAreaCode: "38316" },  
                    { name: "宇和",   weatherAreaCode: "380030", tempAreaCode: "38326" }, 
                    { name: "宇和島", weatherAreaCode: "380030", tempAreaCode: "38356" }   
                ]
            },
            japan: {
                title: "全国の天気",
                centerCode: "130000",
                cities: [
                    { name: "札幌",   center: "016000", weatherAreaCode: "016010", tempAreaCode: "016010" },
                    { name: "仙台",   center: "040000", weatherAreaCode: "040010", tempAreaCode: "040010" },
                    { name: "東京",   center: "130000", weatherAreaCode: "130010", tempAreaCode: "130010" },
                    { name: "名古屋", center: "230000", weatherAreaCode: "230010", tempAreaCode: "230010" },
                    { name: "大阪",   center: "270000", weatherAreaCode: "270000", tempAreaCode: "270000" },
                    { name: "広島",   center: "340000", weatherAreaCode: "340010", tempAreaCode: "340010" },
                    { name: "福岡",   center: "400000", weatherAreaCode: "400010", tempAreaCode: "400010" }
                ]
            }
        };

        function getWeatherIcon(jmaCode) {
            const code = parseInt(jmaCode);
            if ([100, 101, 102, 123, 124, 130, 131].includes(code)) return "☀️";
            if ([200, 201, 202, 213, 214, 224, 230].includes(code)) return "☁️";
            if ([300, 301, 302, 303, 311, 313, 340, 350].includes(code)) return "☔";
            if ([400, 401, 402, 403, 411, 413, 450].includes(code)) return "☃️";
            return "🌤️"; 
        }

        function getModeFromURL() {
            const hash = window.location.hash.replace('#', '').replace(/\/$/, '').trim();
            return areaMapping[hash] ? hash : 'ehime';
        }

        async function fetchAndRenderTimeline() {
            const mode = getModeFromURL();
            const config = areaMapping[mode];

            document.getElementById('view-title').innerText = config.title;
            const container = document.getElementById('timeline-rows');

            try {
                let rowsHTML = '';
                const now = new Date();

                // 日付表示
                const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
                document.getElementById('date-display').innerText = `${now.getMonth() + 1}/${now.getDate()}(${dayNames[now.getDay()]})`;

                // 対象管区の予報JSONを取得
                const response = await fetch(`https://www.jma.go.jp/bosai/forecast/data/forecast/${config.centerCode}.json`);
                const data = await response.json();

                // 【バグ修正】気象庁のJSONから「時系列データ（3時間ごと）」が入っている配列を確実に探す
                const hourlySeries = data.find(item => item.timeSeries && item.timeSeries.length > 0 && item.timeSeries[0].areas[0].weatherCodes);
                if (!hourlySeries) throw new Error("時系列データが見つかりません");

                const timeDefines = hourlySeries.timeSeries[0].timeDefines;

                // 現在時刻以降のデータが始まる位置（インデックス）を取得
                let startIdx = timeDefines.findIndex(timeStr => new Date(timeStr) >= now) - 1;
                if (startIdx < 0) startIdx = 0;

                // 画面上の時間目盛りを生成
                const scaleContainer = document.getElementById('time-scale');
                let scaleHTML = '';
                for(let i = 0; i < 8; i++) {
                    const d = new Date(timeDefines[startIdx + i] || now);
                    scaleHTML += `<div>${d.getHours()}</div>`;
                }
                scaleContainer.innerHTML = scaleHTML;

                // 各都市ごとの個別データを処理
                for (const city of config.cities) {
                    let cityData = data;
                    
                    // 全国の天気モードなどで、別管区のデータを取る必要がある場合
                    if (city.center && city.center !== config.centerCode) {
                        const res = await fetch(`https://www.jma.go.jp/bosai/forecast/data/forecast/${city.center}.json`);
                        cityData = await res.json();
                    }

                    // その都市に対応する時系列データを再検索
                    const cityHourly = cityData.find(item => item.timeSeries && item.timeSeries.length > 0 && item.timeSeries[0].areas[0].weatherCodes);
                    const hourlyWeatherArea = cityHourly.timeSeries[0].areas.find(a => a.area.code === city.weatherAreaCode);
                    let weatherCodes = hourlyWeatherArea ? hourlyWeatherArea.weatherCodes : [];
                    
                    let displayIcons = [];
                    for(let i = 0; i < 8; i++) {
                        const code = weatherCodes[startIdx + i] || "100";
                        displayIcons.push(getWeatherIcon(code));
                    }

                    // --- 各都市の公式最高・最低気温の取得 ---
                    let low = 20;
                    let high = 28;
                    
                    // 日予報のデータ（インデックス0番）から気温データを安全に探す
                    const dailyTempSeries = cityData[0].timeSeries.find(s => s.temps);
                    if (dailyTempSeries && dailyTempSeries.areas) {
                        const exactTempArea = dailyTempSeries.areas.find(a => a.area.code === city.tempAreaCode || a.area.code === city.weatherAreaCode);
                        if (exactTempArea && exactTempArea.temps && exactTempArea.temps.length >= 2) {
                            // 気象庁が値を返している場合のみ数値を上書き
                            if(exactTempArea.temps[0]) low = parseInt(exactTempArea.temps[0]);
                            if(exactTempArea.temps[1]) high = parseInt(exactTempArea.temps[1]);
                        } else if (exactTempArea && exactTempArea.temps && exactTempArea.temps[0]) {
                            low = parseInt(exactTempArea.temps[0]);
                            high = low + 7;
                        }
                    }
                    
                    // 安全ガード（最高気温が最低気温以下になる逆転現象を防ぐ）
                    if (high <= low) high = low + 6;

                    // HTML構築
                    let timelineHTML = '';
                    displayIcons.forEach(icon => {
                        timelineHTML += `<div class="hourly-icon">${icon}</div>`;
                    });

                    rowsHTML += `
                        <div class="row">
                            <div class="city-name">${city.name}</div>
                            <div class="temp-zone">
                                <div class="temp-low">${low}</div>
                                <div class="temp-high">${high}</div>
                            </div>
                            <div class="weather-forecast-bar">
                                ${timelineHTML}
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = rowsHTML;

            } catch (error) {
                console.error("データ解析エラー:", error);
                container.innerHTML = `<div style="color: white; text-align: center; padding: 20px;">データの読み込みに失敗しました。URLや接続環境を確認してください。</div>`;
            }
        }

        fetchAndRenderTimeline();
        setInterval(fetchAndRenderTimeline, 600000);
        window.onhashchange = fetchAndRenderTimeline;
    </script>
</body>
</html>
