<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム時系列天気予報</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="weather-timeline-container">
        
        <div class="timeline-header">
            <div class="date-display" id="date-display">--/--</div>
            <div class="view-title" id="view-title">天気予報</div>
            
            <div class="time-scale" id="time-scale"></div>
        </div>

        <div class="timeline-rows" id="timeline-rows">
            <div style="color: white; text-align: center; padding: 20px; font-weight: bold;">各地域の最新気象データを個別取得中...</div>
        </div>
    </div>

    <script>
        const areaMapping = {
            ehime: {
                title: "愛媛県",
                centerCode: "380000",
                cities: [
                    // それぞれが所属する気象庁のエリア（中心コード）を個別にマッピング
                    { name: "新居浜", center: "380000", weatherAreaCode: "380020", tempAreaCode: "38131" },
                    { name: "今治",   center: "380000", weatherAreaCode: "380020", tempAreaCode: "38116" }, 
                    { name: "松山",   center: "380000", weatherAreaCode: "380010", tempAreaCode: "38211" },  
                    { name: "西条",   center: "380000", weatherAreaCode: "380020", tempAreaCode: "38136" }, 
                    { name: "大洲",   center: "380000", weatherAreaCode: "380030", tempAreaCode: "38316" },  
                    { name: "宇和",   center: "380000", weatherAreaCode: "380030", tempAreaCode: "38326" }, 
                    { name: "宇和島", center: "380000", weatherAreaCode: "380030", tempAreaCode: "38356" }   
                ]
            },
            japan: {
                title: "全国の天気",
                centerCode: "130000",
                cities: [
                    { name: "札幌",   center: "016000", weatherAreaCode: "016010", tempAreaCode: "016010" },
                    { name: "仙台",   center: "040000", weatherAreaCode: "040010", tempAreaCode: "040010" },
                    { name: "東京",   center: "130000", weatherAreaCode: "130010", tempAreaCode: "130010" },
                    { name: "名古屋", center: "230000", weatherAreaCode: "230010", tempAreaCode: "230010" },
                    { name: "大阪",   center: "270000", weatherAreaCode: "270000", tempAreaCode: "270000" },
                    { name: "広島",   center: "340000", weatherAreaCode: "340010", tempAreaCode: "340010" },
                    { name: "福岡",   center: "400000", weatherAreaCode: "400010", tempAreaCode: "400010" }
                ]
            }
        };

        function getWeatherIcon(jmaCode) {
            const code = parseInt(jmaCode);
            if ([100, 101, 102, 123, 124, 130, 131].includes(code)) return "☀️";
            if ([200, 201, 202, 213, 214, 224, 230].includes(code)) return "☁️";
            if ([300, 301, 302, 303, 311, 313, 340, 350].includes(code)) return "☔";
            if ([400, 401, 402, 403, 411, 413, 450].includes(code)) return "☃️";
            return "🌤️"; 
        }

        function getModeFromURL() {
            const hash = window.location.hash.replace('#', '').replace(/\/$/, '').trim();
            return areaMapping[hash] ? hash : 'ehime';
        }

        async function fetchAndRenderTimeline() {
            const mode = getModeFromURL();
            const config = areaMapping[mode];

            document.getElementById('view-title').innerText = config.title;
            const container = document.getElementById('timeline-rows');

            try {
                let rowsHTML = '';
                const now = new Date();

                // 日付表示
                const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
                document.getElementById('date-display').innerText = `${now.getMonth() + 1}/${now.getDate()}(${dayNames[now.getDay()]})`;

                // タイムスケール（時間目盛り）制作用に、まず基準となるJSONを1つ取得
                const baseResponse = await fetch(`https://www.jma.go.jp/bosai/forecast/data/forecast/${config.centerCode}.json`);
                const baseData = await baseResponse.json();
                const hourlySeries = baseData.find(item => item.timeSeries && item.timeSeries.length > 0 && item.timeSeries[0].areas[0].weatherCodes);
                const timeDefines = hourlySeries.timeSeries[0].timeDefines;

                let validIndices = [];
                const oneHourAgo = new Date(now.getTime() - 60 * 60 * 1000);
                for (let i = 0; i < timeDefines.length; i++) {
                    if (new Date(timeDefines[i]) >= oneHourAgo) validIndices.push(i);
                    if (validIndices.length === 8) break;
                }
                while (validIndices.length < 8) {
                    validIndices.push(validIndices[validIndices.length - 1] || 0);
                }

                // 時間目盛りの描画
                const scaleContainer = document.getElementById('time-scale');
                let scaleHTML = '';
                validIndices.forEach(idx => {
                    const d = new Date(timeDefines[idx]);
                    scaleHTML += `<div>${d.getHours()}</div>`;
                });
                scaleContainer.innerHTML = scaleHTML;

                // 【改善】各都市のデータを「完全に独立したURL」から別々に同時取得する
                for (const city of config.cities) {
                    // 各都市が所属する個別の気象データファイルにアクセス（愛媛県内なら380000.json、全国なら各県コード）
                    const res = await fetch(`https://www.jma.go.jp/bosai/forecast/data/forecast/${city.center}.json`);
                    const cityData = await res.json();

                    // 天気アイコンの抽出
                    const cityHourly = cityData.find(item => item.timeSeries && item.timeSeries.length > 0 && item.timeSeries[0].areas[0].weatherCodes);
                    const hourlyWeatherArea = cityHourly.timeSeries[0].areas.find(a => a.area.code === city.weatherAreaCode);
                    let weatherCodes = hourlyWeatherArea ? hourlyWeatherArea.weatherCodes : [];
                    
                    let displayIcons = [];
                    validIndices.forEach(idx => {
                        const code = weatherCodes[idx] || "100";
                        displayIcons.push(getWeatherIcon(code));
                    });

                    // --- 【完全個別】各アメダス・地域コードから直に最高・最低気温をぶっこ抜く ---
                    let low = 21;
                    let high = 28;
                    
                    // インデックス0（日予報）の中から、さらに詳細アメダスコード（tempAreaCode）が完全一致する気温枠を探す
                    const dailyTempSeries = cityData[0].timeSeries.find(s => s.temps);
                    if (dailyTempSeries && dailyTempSeries.areas) {
                        // アメダス個別コードでまずは精密検索。無ければ地域コードで検索
                        let exactTempArea = dailyTempSeries.areas.find(a => a.area.code === city.tempAreaCode);
                        if (!exactTempArea) {
                            exactTempArea = dailyTempSeries.areas.find(a => a.area.code === city.weatherAreaCode);
                        }

                        if (exactTempArea && exactTempArea.temps) {
                            const t = exactTempArea.temps;
                            // 気象庁特有の、時間帯によって配列数が変わるバグを回避してパース
                            if(t.length >= 2) {
                                if(t[0] && !isNaN(parseInt(t[0]))) low = parseInt(t[0]);
                                if(t[1] && !isNaN(parseInt(t[1]))) high = parseInt(t[1]);
                            } else if (t.length === 1 && t[0] && !isNaN(parseInt(t[0]))) {
                                // 最低しか取れなかった場合は最高を推測
                                low = parseInt(t[0]);
                                high = low + 6;
                            }
                        }
                    }
                    
                    if (high <= low) high = low + 6;

                    // HTML構築
                    let timelineHTML = '';
                    displayIcons.forEach(icon => {
                        timelineHTML += `<div class="hourly-icon">${icon}</div>`;
                    });

                    rowsHTML += `
                        <div class="row">
                            <div class="city-name">${city.name}</div>
                            <div class="temp-zone">
                                <div class="temp-low">${low}</div>
                                <div class="temp-high">${high}</div>
                            </div>
                            <div class="weather-forecast-bar">
                                ${timelineHTML}
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = rowsHTML;

            } catch (error) {
                console.error("データ解析エラー:", error);
                container.innerHTML = `<div style="color: white; text-align: center; padding: 20px;">データの読み込みに失敗しました。</div>`;
            }
        }

        fetchAndRenderTimeline();
        setInterval(fetchAndRenderTimeline, 600000);
        window.onhashchange = fetchAndRenderTimeline;
    </script>
</body>
</html>
