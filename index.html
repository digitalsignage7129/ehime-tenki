<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム時系列天気予報</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- メインコンテナ -->
    <div class="weather-timeline-container">
        
        <!-- ヘッダーエリア -->
        <div class="timeline-header">
            <div class="date-display" id="date-display">--/--</div>
            <div class="view-title" id="view-title">天気予報</div>
            
            <!-- 時間目盛り（3時間刻み・8枠分） -->
            <div class="time-scale" id="time-scale"></div>
        </div>

        <!-- タイムラインの行 -->
        <div class="timeline-rows" id="timeline-rows">
            <div style="color: white; text-align: center; padding: 20px; font-weight: bold;">高精度気象データを読み込み中...</div>
        </div>
    </div>

    <script>
        // 愛媛各地および全国主要都市の正確な【緯度(lat)・経度(lon)】を設定
        const areaMapping = {
            ehime: {
                title: "愛媛県",
                cities: [
                    { name: "新居浜", lat: 33.9572, lon: 133.2828 },
                    { name: "今治",   lat: 34.0662, lon: 132.9978 }, 
                    { name: "松山",   lat: 33.8416, lon: 132.7657 },  
                    { name: "西条",   lat: 33.9189, lon: 133.1819 }, 
                    { name: "大洲",   lat: 33.5065, lon: 132.5447 },  
                    { name: "宇和",   lat: 33.3644, lon: 132.5111 }, 
                    { name: "宇和島", lat: 33.2234, lon: 132.5605 }   
                ]
            },
            japan: {
                title: "全国の天気",
                cities: [
                    { name: "札幌",   lat: 43.0621, lon: 141.3544 },
                    { name: "仙台",   lat: 38.2682, lon: 140.8694 },
                    { name: "東京",   lat: 35.6895, lon: 139.6917 },
                    { name: "名古屋", lat: 35.1815, lon: 136.9066 },
                    { name: "大阪",   lat: 34.6937, lon: 135.5022 },
                    { name: "広島",   lat: 34.3853, lon: 132.4553 },
                    { name: "福岡",   lat: 33.5904, lon: 130.4017 }
                ]
            }
        };

        // Open-Meteoの天気コード（WMO準拠）を、見慣れた絵文字に変換
        function getWeatherIcon(wmoCode) {
            if ([0].includes(wmoCode)) return "☀️"; // 快晴
            if ([1, 2].includes(wmoCode)) return "🌤️"; // 晴れ・晴れ時々曇り
            if ([3].includes(wmoCode)) return "☁️"; // 曇り
            if ([45, 48].includes(wmoCode)) return "🌫️"; // 霧
            if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(wmoCode)) return "☔"; // 雨・小雨・にわか雨
            if ([71, 73, 75, 77, 85, 86].includes(wmoCode)) return "☃️"; // 雪
            if ([95, 96, 99].includes(wmoCode)) return "⚡"; // 雷雨
            return "🌤️"; 
        }

        function getModeFromURL() {
            const hash = window.location.hash.replace('#', '').replace(/\/$/, '').trim();
            return areaMapping[hash] ? hash : 'ehime';
        }

        async function fetchAndRenderTimeline() {
            const mode = getModeFromURL();
            const config = areaMapping[mode];

            document.getElementById('view-title').innerText = config.title;
            const container = document.getElementById('timeline-rows');

            try {
                let rowsHTML = '';
                const now = new Date();

                // タイムラインに表示する8つの時間枠（今から最も近い3時間刻みの枠〜21時間先まで）を計算
                const startHour = Math.floor(now.getHours() / 3) * 3; // 例：19時なら18時スタート
                const baseDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), startHour, 0, 0);

                const displayTimes = [];
                for (let i = 0; i < 8; i++) {
                    const t = new Date(baseDate.getTime() + i * 3 * 60 * 60 * 1000);
                    displayTimes.push(t);
                }

                // ヘッダーに日付をセット（例: "7/15(水)"）
                const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
                document.getElementById('date-display').innerText = `${displayTimes[0].getMonth() + 1}/${displayTimes[0].getDate()}(${dayNames[displayTimes[0].getDay()]})`;

                // ヘッダーに時間目盛りを描画（例： 18 21 0 3 6 9 12 15）
                const scaleContainer = document.getElementById('time-scale');
                let scaleHTML = '';
                displayTimes.forEach(t => {
                    scaleHTML += `<div>${t.getHours()}</div>`;
                });
                scaleContainer.innerHTML = scaleHTML;

                // 各都市の3時間ごとのピンポイント天気と気温をフェッチ
                for (const city of config.cities) {
                    const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&hourly=temperature_2m,weather_code&timezone=Asia%2FTokyo`);
                    const data = await response.json();

                    const hourlyTimes = data.hourly.time; // "2026-07-15T18:00" のような文字列配列
                    const temperatures = data.hourly.temperature_2m;
                    const weatherCodes = data.hourly.weather_code;

                    let timelineHTML = '';
                    let matchedTemps = [];

                    // 生成した表示時刻(8つの枠)に一致するデータを、APIから取得した48時間データから見つけて抽出
                    displayTimes.forEach(targetTime => {
                        // タイムゾーン文字列のズレを吸収して照合するため、ローカルの時刻文字列を生成
                        const year = targetTime.getFullYear();
                        const month = String(targetTime.getMonth() + 1).padStart(2, '0');
                        const date = String(targetTime.getDate()).padStart(2, '0');
                        const hour = String(targetTime.getHours()).padStart(2, '0');
                        const matchStr = `${year}-${month}-${date}T${hour}:00`;

                        const idx = hourlyTimes.indexOf(matchStr);
                        if (idx !== -1) {
                            const tempVal = Math.round(temperatures[idx]);
                            const codeVal = weatherCodes[idx];
                            
                            // 各マスに、その時間の天気アイコンと、ピンポイントの個別気温(度)をセット
                            timelineHTML += `
                                <div class="hourly-icon-box">
                                    <div class="hourly-icon">${getWeatherIcon(codeVal)}</div>
                                    <div class="hourly-temp">${tempVal}°</div>
                                </div>
                            `;
                            matchedTemps.push(tempVal);
                        } else {
                            // 万が一見つからなかった場合のフォールバック
                            timelineHTML += `
                                <div class="hourly-icon-box">
                                    <div class="hourly-icon">🌤️</div>
                                    <div class="hourly-temp">--°</div>
                                </div>
                            `;
                        }
                    });

                    // その都市のタイムラインの中で、最も「低い気温」と「高い気温」を自動計算
                    const low = matchedTemps.length > 0 ? Math.min(...matchedTemps) : "--";
                    const high = matchedTemps.length > 0 ? Math.max(...matchedTemps) : "--";

                    // 都市ごとの行をレンダリング
                    rowsHTML += `
                        <div class="row">
                            <div class="city-name">${city.name}</div>
                            <div class="temp-zone">
                                <div class="temp-low">${low}</div>
                                <div class="temp-high">${high}</div>
                            </div>
                            <div class="weather-forecast-bar">
                                ${timelineHTML}
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = rowsHTML;

            } catch (error) {
                console.error("Open-Meteo接続エラー:", error);
                container.innerHTML = `<div style="color: white; text-align: center; padding: 20px;">お天気データの取得に失敗しました</div>`;
            }
        }

        fetchAndRenderTimeline();
        setInterval(fetchAndRenderTimeline, 600000); // 10分おきに自動更新
        window.onhashchange = fetchAndRenderTimeline;
    </script>
</body>
</html>
