<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3時間ごとのピンポイント天気予報</title>
    <style>
        /* ベースデザイン：モダンで目に優しいダークテーマ */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-orange: #fb923c;
            --border-color: #334155;
        }

        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px; /* スマホで見やすい横幅に固定 */
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 8px 0;
            color: var(--text-main);
        }

        .date-badge {
            display: inline-block;
            background-color: var(--accent-blue);
            color: #0f172a;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        /* 都市切り替え用のセレクトボックス（操作性向上） */
        .selector-container {
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
        }

        select {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            font-size: 1rem;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        /* 縦型タイムラインカード */
        .timeline-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .city-title {
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .city-coords {
            font-size: 0.8rem;
            color: var(--text-sub);
            font-weight: normal;
        }

        /* 縦型タイムラインの1行（時間、天気、気温） */
        .timeline-item {
            display: flex;
            align-items: center;
            padding: 14px 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .timeline-item:last-child {
            border-bottom: none;
        }

        /* ① 時間部分：はっきり大きく表示 */
        .time-box {
            width: 80px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .time-sub {
            font-size: 0.75rem;
            color: var(--text-sub);
            font-weight: normal;
            margin-top: 2px;
        }

        /* ② 天気マークと説明テキスト */
        .weather-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .weather-icon {
            font-size: 1.8rem; /* 絵文字を大きくして見やすく */
            line-height: 1;
        }

        .weather-desc {
            font-size: 0.95rem;
            color: var(--text-sub);
            font-weight: 500;
        }

        /* ③ 気温：圧倒的な視認性（太字・カラー） */
        .temp-box {
            font-size: 1.6rem; /* 数字を極大に */
            font-weight: 800;
            color: var(--accent-orange); /* 気温は目立つ暖色に */
            text-align: right;
            min-width: 70px;
        }

        .temp-unit {
            font-size: 1rem;
            font-weight: normal;
            color: var(--text-sub);
            margin-left: 2px;
        }

        /* エラー表示 */
        .error-message {
            text-align: center;
            color: #ef4444;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="header-title">3時間ごとの天気予報</h1>
            <div class="date-badge" id="date-badge">--/--</div>
        </header>

        <!-- 地域・都市選択メニュー -->
        <div class="selector-container">
            <select id="area-select">
                <option value="ehime">愛媛県エリア</option>
                <option value="japan">全国主要都市</option>
            </select>
            <select id="city-select">
                <!-- JavaScriptで都市リストを自動生成します -->
            </select>
        </div>

        <!-- 予報表示メインカード -->
        <div class="timeline-card">
            <div class="city-title">
                <span id="display-city-name">都市名</span>
                <span class="city-coords" id="display-coords">緯度/経度</span>
            </div>
            
            <!-- 3時間ごとのリストがここに縦に並びます -->
            <div id="timeline-list">
                <div style="text-align: center; padding: 40px; color: var(--text-sub);">
                    気象データを読み込み中...
                </div>
            </div>
        </div>
    </div>

    <script>
        // 愛媛各地および全国主要都市の【緯度(lat)・経度(lon)】
        const areaMapping = {
            ehime: {
                title: "愛媛県の天気",
                cities: [
                    { name: "新居浜市", lat: 33.9572, lon: 133.2828 },
                    { name: "今治市",   lat: 34.0662, lon: 132.9978 }, 
                    { name: "松山市",   lat: 33.8416, lon: 132.7657 },  
                    { name: "西条市",   lat: 33.9189, lon: 133.1819 }, 
                    { name: "大洲市",   lat: 33.5065, lon: 132.5447 },  
                    { name: "西予市宇和", lat: 33.3644, lon: 132.5111 }, 
                    { name: "宇和島市", lat: 33.2234, lon: 132.5605 }   
                ]
            },
            japan: {
                title: "全国主要都市の天気",
                cities: [
                    { name: "東京都心",   lat: 35.6895, lon: 139.6917 },
                    { name: "大阪市",   lat: 34.6937, lon: 135.5022 },
                    { name: "札幌市",   lat: 43.0621, lon: 141.3544 },
                    { name: "仙台市",   lat: 38.2682, lon: 140.8694 },
                    { name: "名古屋市", lat: 35.1815, lon: 136.9066 },
                    { name: "広島市",   lat: 34.3853, lon: 132.4553 },
                    { name: "福岡市",   lat: 33.5904, lon: 130.4017 }
                ]
            }
        };

        // WMO天気コードを、日本語の天気名と絵文字に翻訳
        function getWeatherDetail(wmoCode) {
            const table = {
                0: { text: "快晴", icon: "☀️" },
                1: { text: "晴れ", icon: "🌤️" },
                2: { text: "晴れ時々曇", icon: "🌤️" },
                3: { text: "曇り", icon: "☁️" },
                45: { text: "霧", icon: "🌫️" },
                48: { text: "霧", icon: "🌫️" },
                51: { text: "小雨", icon: "☔" },
                53: { text: "雨", icon: "☔" },
                55: { text: "強い雨", icon: "☔" },
                61: { text: "弱い雨", icon: "☔" },
                63: { text: "雨", icon: "☔" },
                65: { text: "激しい雨", icon: "☔" },
                71: { text: "弱い雪", icon: "☃️" },
                73: { text: "雪", icon: "☃️" },
                75: { text: "強い雪", icon: "☃️" },
                80: { text: "にわか雨", icon: "☔" },
                81: { text: "強いにわか雨", icon: "☔" },
                95: { text: "雷雨", icon: "⚡" }
            };
            return table[wmoCode] || { text: "曇り", icon: "☁️" };
        }

        const areaSelect = document.getElementById('area-select');
        const citySelect = document.getElementById('city-select');

        // 1. セレクトボックスの初期化と連動
        function updateCityOptions() {
            const selectedArea = areaSelect.value;
            const cities = areaMapping[selectedArea].cities;
            
            citySelect.innerHTML = '';
            cities.forEach((city, index) => {
                const opt = document.createElement('option');
                opt.value = index;
                opt.textContent = city.name;
                citySelect.appendChild(opt);
            });
            
            fetchAndRender();
        }

        // 2. メインの描画処理（Open-Meteoから3時間ごと、計24時間分のデータを取得）
        async function fetchAndRender() {
            const areaKey = areaSelect.value;
            const cityIndex = citySelect.value;
            const city = areaMapping[areaKey].cities[cityIndex];

            if (!city) return;

            document.getElementById('display-city-name').textContent = city.name;
            document.getElementById('display-coords').textContent = `北緯${city.lat}° / 東経${city.lon}°`;
            
            const listContainer = document.getElementById('timeline-list');

            try {
                // APIリクエスト（1時間ごとのデータを取得）
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&hourly=temperature_2m,weather_code&timezone=Asia%2FTokyo`);
                if (!response.ok) throw new Error("APIエラー");
                const data = await response.json();

                const hourlyTimes = data.hourly.time;
                const temperatures = data.hourly.temperature_2m;
                const weatherCodes = data.hourly.weather_code;

                // 今から最も近い「3の倍数時間」の起点を作る
                const now = new Date();
                const startHour = Math.floor(now.getHours() / 3) * 3;
                const baseDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), startHour, 0, 0);

                // 今日〜明日にかけての、3時間ごと「計8枠（24時間分）」の日時リストを生成
                const displayTimes = [];
                for (let i = 0; i < 8; i++) {
                    displayTimes.push(new Date(baseDate.getTime() + i * 3 * 60 * 60 * 1000));
                }

                // ヘッダーの日付表示（例：7/15(水)）
                const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
                document.getElementById('date-badge').innerText = `${displayTimes[0].getMonth() + 1}/${displayTimes[0].getDate()} (${dayNames[displayTimes[0].getDay()]})`;

                // 縦型タイムラインのHTML組み立て
                let timelineHTML = '';

                displayTimes.forEach(targetTime => {
                    // APIの時刻文字列（"YYYY-MM-DDTHH:00"）と照合
                    const year = targetTime.getFullYear();
                    const month = String(targetTime.getMonth() + 1).padStart(2, '0');
                    const date = String(targetTime.getDate()).padStart(2, '0');
                    const hour = String(targetTime.getHours()).padStart(2, '0');
                    const matchStr = `${year}-${month}-${date}T${hour}:00`;

                    const idx = hourlyTimes.indexOf(matchStr);
                    
                    let tempVal = "--";
                    let weatherInfo = { text: "データなし", icon: "❓" };

                    if (idx !== -1) {
                        tempVal = Math.round(temperatures[idx]);
                        weatherInfo = getWeatherDetail(weatherCodes[idx]);
                    }

                    // 何日のデータか識別するためのサブテキスト（日を跨ぐ時に「明日」と表記）
                    const isNextDay = targetTime.getDate() !== now.getDate();
                    const dayLabel = isNextDay ? "明日" : "今日";

                    timelineHTML += `
                        <div class="timeline-item">
                            <!-- ① 時間 -->
                            <div class="time-box">
                                <div>${hour}:00</div>
                                <div class="time-sub">${dayLabel}</div>
                            </div>
                            <!-- ② 天気（状態） -->
                            <div class="weather-box">
                                <span class="weather-icon">${weatherInfo.icon}</span>
                                <span class="weather-desc">${weatherInfo.text}</span>
                            </div>
                            <!-- ③ 気温（大型化して視認性を劇的に向上） -->
                            <div class="temp-box">
                                ${tempVal}<span class="temp-unit">°C</span>
                            </div>
                        </div>
                    `;
                });

                listContainer.innerHTML = timelineHTML;

            } catch (error) {
                console.error(error);
                listContainer.innerHTML = `<div class="error-message">お天気データの取得に失敗しました。<br>時間をおいて再度お試しください。</div>`;
            }
        }

        // イベントリスナー登録
        areaSelect.addEventListener('change', updateCityOptions);
        citySelect.addEventListener('change', fetchAndRender);

        // 初回ロード実行
        updateCityOptions();
    </script>
</body>
</html>
