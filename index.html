<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム時系列天気予報</title>
    <style>
        /* ダークテーマベースの美しい配色 */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-orange: #fb923c;
            --border-color: #334155;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .weather-timeline-container {
            width: 100%;
            max-width: 950px; /* 横幅を十分に確保 */
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* 3つのエリア（都市名、最低/最高、時間枠）を完璧に整列させるための共通グリッド定義 */
        .grid-layout {
            display: grid;
            grid-template-columns: 120px 80px 1fr; /* 都市名幅 | 最低最高幅 | 8マスの時間軸 */
            align-items: center;
        }

        /* ヘッダーエリア */
        .timeline-header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 8px;
        }

        .header-title-zone {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .view-title {
            font-size: 1.25rem;
            font-weight: bold;
        }

        .date-display {
            background-color: var(--accent-blue);
            color: #0f172a;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        /* 時間の目盛りヘッダー */
        .time-scale {
            display: grid;
            grid-template-columns: repeat(8, 1fr); /* 8等分 */
            text-align: center;
        }

        .time-scale-item {
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--accent-blue);
        }

        .time-scale-day {
            font-size: 0.7rem;
            color: var(--text-sub);
            margin-bottom: 2px;
        }

        /* 各都市のデータ行 */
        .row {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .row:last-child {
            border-bottom: none;
        }

        /* ① 都市名 */
        .city-name {
            font-weight: bold;
            font-size: 1.05rem;
            padding-right: 8px;
        }

        /* ② 最低・最高気温の要約 */
        .temp-zone {
            display: flex;
            flex-direction: column;
            font-size: 0.75rem;
            font-weight: bold;
            line-height: 1.3;
            border-right: 1px solid var(--border-color);
            padding-right: 8px;
        }
        .temp-high { color: #f87171; } /* 赤 */
        .temp-low { color: #60a5fa; }  /* 青 */

        /* ③ 右側の3時間ごと予報バー */
        .weather-forecast-bar {
            display: grid;
            grid-template-columns: repeat(8, 1fr); /* ヘッダーの時間軸と完全に一致する8等分 */
            text-align: center;
        }

        /* 1時間枠のセル（アイコンと気温を縦並びにして絶対ズレを防ぐ） */
        .hourly-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .hourly-icon {
            font-size: 1.5rem;
            line-height: 1;
        }

        /* 気温の数字（大きく、太く、見やすく調整） */
        .hourly-temp {
            font-size: 1.05rem;
            font-weight: bold;
            color: var(--accent-orange); /* 視認性の高い暖色に */
        }

        /* ナビゲーション */
        .nav-links {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .nav-btn {
            background-color: var(--border-color);
            color: var(--text-main);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .nav-btn:hover {
            background-color: var(--accent-blue);
            color: #0f172a;
        }
    </style>
</head>
<body>

    <div class="weather-timeline-container">
        
        <!-- ヘッダー -->
        <div class="timeline-header">
            <div class="header-title-zone">
                <div class="view-title" id="view-title">天気予報</div>
                <div class="date-display" id="date-display">--/--</div>
            </div>
            
            <!-- 上部の時間軸（都市行と完全に並びが一致します） -->
            <div class="grid-layout">
                <div></div> <!-- 都市名用の空白スペース -->
                <div></div> <!-- 気温サマリー用の空白スペース -->
                <div class="time-scale" id="time-scale">
                    <!-- JavaScriptでここに時間が8個生成されます -->
                </div>
            </div>
        </div>

        <!-- タイムラインデータ行の表示コンテナ -->
        <div class="timeline-rows" id="timeline-rows">
            <div style="color: white; text-align: center; padding: 20px; font-weight: bold;">最新データを読み込み中...</div>
        </div>

        <!-- 簡易地域切り替えナビ -->
        <div class="nav-links">
            <a href="#ehime" class="nav-btn">愛媛県</a>
            <a href="#japan" class="nav-btn">全国の天気</a>
        </div>
    </div>

    <script>
        const areaMapping = {
            ehime: {
                title: "愛媛県",
                cities: [
                    { name: "新居浜", lat: 33.9572, lon: 133.2828 },
                    { name: "今治",   lat: 34.0662, lon: 132.9978 }, 
                    { name: "松山",   lat: 33.8416, lon: 132.7657 },  
                    { name: "西条",   lat: 33.9189, lon: 133.1819 }, 
                    { name: "大洲",   lat: 33.5065, lon: 132.5447 },  
                    { name: "宇和",   lat: 33.3644, lon: 132.5111 }, 
                    { name: "宇和島", lat: 33.2234, lon: 132.5605 }   
                ]
            },
            japan: {
                title: "全国の天気",
                cities: [
                    { name: "札幌",   lat: 43.0621, lon: 141.3544 },
                    { name: "仙台",   lat: 38.2682, lon: 140.8694 },
                    { name: "東京",   lat: 35.6895, lon: 139.6917 },
                    { name: "名古屋", lat: 35.1815, lon: 136.9066 },
                    { name: "大阪",   lat: 34.6937, lon: 135.5022 },
                    { name: "広島",   lat: 34.3853, lon: 132.4553 },
                    { name: "福岡",   lat: 33.5904, lon: 130.4017 }
                ]
            }
        };

        function getWeatherIcon(wmoCode) {
            if ([0].includes(wmoCode)) return "☀️"; 
            if ([1, 2].includes(wmoCode)) return "🌤️"; 
            if ([3].includes(wmoCode)) return "☁️"; 
            if ([45, 48].includes(wmoCode)) return "🌫️"; 
            if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(wmoCode)) return "☔"; 
            if ([71, 73, 75, 77, 85, 86].includes(wmoCode)) return "☃️"; 
            if ([95, 96, 99].includes(wmoCode)) return "⚡"; 
            return "🌤️"; 
        }

        function getModeFromURL() {
            const hash = window.location.hash.replace('#', '').replace(/\/$/, '').trim();
            return areaMapping[hash] ? hash : 'ehime';
        }

        async function fetchAndRenderTimeline() {
            const mode = getModeFromURL();
            const config = areaMapping[mode];

            document.getElementById('view-title').innerText = config.title + " (3時間予報)";
            const container = document.getElementById('timeline-rows');

            try {
                let rowsHTML = '';
                const now = new Date();

                // 3時間ごとの時間枠（計8枠 = 24時間分）を正確に計算
                const startHour = Math.floor(now.getHours() / 3) * 3;
                const baseDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), startHour, 0, 0);

                const displayTimes = [];
                for (let i = 0; i < 8; i++) {
                    displayTimes.push(new Date(baseDate.getTime() + i * 3 * 60 * 60 * 1000));
                }

                // 日付ヘッダーの更新（開始地点の月日）
                const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
                document.getElementById('date-display').innerText = `${displayTimes[0].getMonth() + 1}/${displayTimes[0].getDate()}(${dayNames[displayTimes[0].getDay()]})`;

                // 上部時間軸のHTML生成（何日かのラベルも添えて絶対にズレないように並べる）
                const scaleContainer = document.getElementById('time-scale');
                let scaleHTML = '';
                displayTimes.forEach(t => {
                    const isNextDay = t.getDate() !== now.getDate();
                    const dayLabel = isNextDay ? "明日" : "今日";
                    scaleHTML += `
                        <div class="time-scale-item">
                            <div class="time-scale-day">${dayLabel}</div>
                            <div>${t.getHours()}時</div>
                        </div>
                    `;
                });
                scaleContainer.innerHTML = scaleHTML;

                // 各都市ごとの処理
                for (const city of config.cities) {
                    const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&hourly=temperature_2m,weather_code&timezone=Asia%2FTokyo`);
                    const data = await response.json();

                    const hourlyTimes = data.hourly.time;
                    const temperatures = data.hourly.temperature_2m;
                    const weatherCodes = data.hourly.weather_code;

                    let timelineHTML = '';
                    let matchedTemps = [];

                    displayTimes.forEach(targetTime => {
                        const year = targetTime.getFullYear();
                        const month = String(targetTime.getMonth() + 1).padStart(2, '0');
                        const date = String(targetTime.getDate()).padStart(2, '0');
                        const hour = String(targetTime.getHours()).padStart(2, '0');
                        const matchStr = `${year}-${month}-${date}T${hour}:00`;

                        const idx = hourlyTimes.indexOf(matchStr);
                        if (idx !== -1) {
                            const tempVal = Math.round(temperatures[idx]);
                            const codeVal = weatherCodes[idx];
                            
                            // アイコンと気温を縦に組み合わせた1つのセルを生成
                            timelineHTML += `
                                <div class="hourly-cell">
                                    <div class="hourly-icon">${getWeatherIcon(codeVal)}</div>
                                    <div class="hourly-temp">${tempVal}°</div>
                                </div>
                            `;
                            matchedTemps.push(tempVal);
                        } else {
                            timelineHTML += `
                                <div class="hourly-cell">
                                    <div class="hourly-icon">🌤️</div>
                                    <div class="hourly-temp">--°</div>
                                </div>
                            `;
                        }
                    });

                    // 24時間内での最低・最高気温
                    const low = matchedTemps.length > 0 ? Math.min(...matchedTemps) : "--";
                    const high = matchedTemps.length > 0 ? Math.max(...matchedTemps) : "--";

                    // 行の組み立て（ヘッダーと寸分違わず配置が揃う grid-layout 構造）
                    rowsHTML += `
                        <div class="row grid-layout">
                            <div class="city-name">${city.name}</div>
                            <div class="temp-zone">
                                <span class="temp-high">最高 ${high}°</span>
                                <span class="temp-low">最低 ${low}°</span>
                            </div>
                            <div class="weather-forecast-bar">
                                ${timelineHTML}
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = rowsHTML;

            } catch (error) {
                console.error("Open-Meteo取得エラー:", error);
                container.innerHTML = `<div style="color: white; text-align: center; padding: 20px;">お天気データの読み込みに失敗しました。</div>`;
            }
        }

        fetchAndRenderTimeline();
        setInterval(fetchAndRenderTimeline, 600000);
        window.onhashchange = fetchAndRenderTimeline;
    </script>
</body>
</html>
