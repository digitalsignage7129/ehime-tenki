<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【画像・画質改善版】自動更新サイネージ</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-sub: #475569;
            --border-color: #cbd5e1;
            --primary-blue: #1e88e5;
            --accent-orange: #ea580c;
            --alert-red: #dc2626;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 2vw;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 4vh 4vw;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease-in-out, visibility 1s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
        }

        .slide-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid var(--primary-blue);
            padding-bottom: 1.5vh;
            height: 12vh;
        }

        .orange-theme { border-bottom-color: var(--accent-orange); }
        .red-theme { border-bottom-color: var(--alert-red); }

        .slide-title {
            font-size: 3.2vw;
            font-weight: 900;
            margin: 0;
        }

        .slide-badge {
            background-color: #e0f2fe;
            color: #0369a1;
            font-weight: bold;
            padding: 0.8vh 2vw;
            border-radius: 30px;
            font-size: 1.5vw;
        }

        .orange-theme .slide-badge { background-color: #ffedd5; color: #c2410c; }
        .red-theme .slide-badge { background-color: #fee2e2; color: #991b1b; }

        .slide-body {
            flex-grow: 1;
            display: flex;
            align-items: center;
            height: 64vh;
        }

        .content-split {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 3vw;
            align-items: center;
        }

        .content-left {
            flex: 6;
            display: flex;
            flex-direction: column;
            gap: 2vh;
        }

        .content-right {
            flex: 4;
            border-radius: 12px;
            height: 100%;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background-color: #f1f5f9;
        }

        /* 📸 高画質な画像をボケさせずに綺麗にフィットさせる設定 */
        .content-right img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .accent-box {
            border-left: 8px solid var(--primary-blue);
            padding-left: 1.5vw;
        }

        .orange-theme .accent-box { border-left-color: var(--accent-orange); }
        .red-theme .accent-box { border-left-color: var(--alert-red); }

        .main-message {
            font-size: 3.3vw;
            font-weight: 800;
            line-height: 1.3;
            color: var(--text-main);
        }

        .sub-description {
            font-size: 1.8vw;
            line-height: 1.6;
            color: var(--text-sub);
        }

        .slide-footer {
            height: 8vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 1vh;
            font-size: 1.3vw;
            color: var(--text-sub);
        }

        .nav-dots { display: flex; gap: 0.8vw; }
        .dot {
            width: 1.2vw;
            height: 1.2vw;
            border-radius: 50%;
            background-color: #cbd5e1;
        }
        .dot.active { background-color: var(--primary-blue); }
        .orange-theme-dot.active { background-color: var(--accent-orange); }
        .red-theme-dot.active { background-color: var(--alert-red); }
    </style>
</head>
<body>

    <div class="slide-container">

        <!-- 1枚目：観光 -->
        <div class="slide active orange-theme" id="slide-0">
            <div class="slide-header orange-theme">
                <h1 class="slide-title">🍊 愛媛県 観光案内</h1>
                <div class="slide-badge">最新観光データ</div>
            </div>
            <div class="slide-body">
                <div class="content-split">
                    <div class="content-left">
                        <div class="accent-box">
                            <div class="main-message" id="s0-title">読込中...</div>
                        </div>
                        <div class="sub-description" id="s0-desc">データを取得しています。</div>
                    </div>
                    <div class="content-right">
                        <img id="s0-img" src="" alt="観光写真">
                    </div>
                </div>
            </div>
            <div class="slide-footer">
                <div>データソース：愛媛県観光オープンデータ</div>
                <div class="nav-dots">
                    <div class="dot active orange-theme-dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>

        <!-- 2枚目：道路 -->
        <div class="slide" id="slide-1">
            <div class="slide-header">
                <h1 class="slide-title">🚗 リアルタイム道路状況</h1>
                <div class="slide-badge">JARTIC交通データ</div>
            </div>
            <div class="slide-body">
                <div class="content-split">
                    <div class="content-left">
                        <div class="accent-box">
                            <div class="main-message" id="s1-title">読込中...</div>
                        </div>
                        <div class="sub-description" id="s1-desc">データを取得しています。</div>
                    </div>
                    <div class="content-right">
                        <img id="s1-img" src="" alt="道路情報イメージ">
                    </div>
                </div>
            </div>
            <div class="slide-footer">
                <div>データソース：JARTIC道路交通量API</div>
                <div class="nav-dots">
                    <div class="dot"></div>
                    <div class="dot active"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>

        <!-- 3枚目：天気 -->
        <div class="slide orange-theme" id="slide-2">
            <div class="slide-header orange-theme">
                <h1 class="slide-title">🌤️ ピンポイント天気予報</h1>
                <div class="slide-badge">気象庁・環境省WBGT</div>
            </div>
            <div class="slide-body">
                <div class="content-split">
                    <div class="content-left">
                        <div class="accent-box">
                            <div class="main-message" id="s2-title">読込中...</div>
                        </div>
                        <div class="sub-description" id="s2-desc">データを取得しています。</div>
                    </div>
                    <div class="content-right">
                        <img id="s2-img" src="" alt="天気マーク">
                    </div>
                </div>
            </div>
            <div class="slide-footer">
                <div>データソース：気象庁防災XML / 環境省</div>
                <div class="nav-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot active orange-theme-dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>

        <!-- 4枚目：警告 -->
        <div class="slide red-theme" id="slide-3">
            <div class="slide-header red-theme">
                <h1 class="slide-title">🚨 広域防災・通行規制アラート</h1>
                <div class="slide-badge">国土交通省 災害規制情報</div>
            </div>
            <div class="slide-body">
                <div class="content-split">
                    <div class="content-left">
                        <div class="accent-box">
                            <div class="main-message" id="s3-title">読込中...</div>
                        </div>
                        <div class="sub-description" id="s3-desc">データを取得しています。</div>
                    </div>
                    <div class="content-right">
                        <img id="s3-img" src="" alt="警告イメージ">
                    </div>
                </div>
            </div>
            <div class="slide-footer">
                <div>データソース：国交省 災害情報オープンデータ</div>
                <div class="nav-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot active red-theme-dot"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const slides = document.querySelectorAll('.slide');
        let currentSlideIndex = 0;
        const slideIntervalTime = 10000;

        async function loadSignageData() {
            try {
                const response = await fetch('signage_data.json?t=' + Date.now());
                const data = await response.json();

                document.getElementById('s0-title').textContent = data.slide0.title;
                document.getElementById('s0-desc').textContent = data.slide0.desc;
                document.getElementById('s0-img').src = data.slide0.image;

                document.getElementById('s1-title').textContent = data.slide1.title;
                document.getElementById('s1-desc').textContent = data.slide1.desc;
                document.getElementById('s1-img').src = data.slide1.image;

                document.getElementById('s2-title').textContent = data.slide2.title;
                document.getElementById('s2-desc').textContent = data.slide2.desc;
                document.getElementById('s2-img').src = data.slide2.image;

                document.getElementById('s3-title').textContent = data.slide3.title;
                document.getElementById('s3-desc').textContent = data.slide3.desc;
                document.getElementById('s3-img').src = data.slide3.image;

            } catch (error) {
                console.error("データの同期に失敗しました:", error);
            }
        }

        function showNextSlide() {
            slides[currentSlideIndex].classList.remove('active');
            currentSlideIndex = (currentSlideIndex + 1) % slides.length;
            slides[currentSlideIndex].classList.add('active');

            if (currentSlideIndex === 0) {
                loadSignageData();
            }
        }

        loadSignageData();
        setInterval(showNextSlide, slideIntervalTime);
    </script>
</body>
</html>
